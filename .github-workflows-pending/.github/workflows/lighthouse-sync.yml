name: Lighthouse Sync

on:
  schedule:
    # 4 syncs/day in UTC: 06:00, 12:00, 16:00, 22:00
    # Matches Lighthouse's typical refresh cadence (~6h).
    - cron: '0 6,12,16,22 * * *'
  workflow_dispatch:
    # Manual trigger for debugging / War Room mode
    inputs:
      batch_index:
        description: 'Batch index (0-indexed)'
        required: false
        default: '0'
      batch_count:
        description: 'Total batches (1 = no sharding, single run)'
        required: false
        default: '1'

# Concurrency: never run two syncs simultaneously on the same batch
concurrency:
  group: lighthouse-sync-${{ inputs.batch_index || 0 }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20  # generous; expect 2-5 min in Tier 1

    # SCALING NOTE: when hotel count exceeds ~30, switch to matrix:
    #   strategy:
    #     fail-fast: false
    #     matrix:
    #       batch: [0, 1, 2, 3]   # 4 parallel batches
    #   env:
    #     BATCH_INDEX: ${{ matrix.batch }}
    #     BATCH_COUNT: '4'
    # The worker is already partition-aware (md5(hotel_id) % batch_count).

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install worker dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx==0.28.1 tenacity==9.1.4

      - name: Run Lighthouse sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LIGHTHOUSE_DAYS_AHEAD: '90'
          WORKER_TRIGGER_SOURCE: ${{ github.event_name == 'workflow_dispatch' && 'manual' || 'cron' }}
        run: |
          cd ${{ github.workspace }}
          PYTHONPATH=. python -m backend.workers.lighthouse_sync \
            --batch-index ${{ inputs.batch_index || 0 }} \
            --batch-count ${{ inputs.batch_count || 1 }} \
            --trigger-source ${{ github.event_name == 'workflow_dispatch' && 'manual' || 'cron' }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "::warning::Lighthouse sync failed. Check public.worker_runs and public.competitor_sync_failures for details."
