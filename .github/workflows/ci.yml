name: CI

# Garde-fou qualité : sur chaque pull request (et sur push vers main),
# on vérifie que le bundle se construit et que les tests unitaires passent.
# Empêche qu'une dépendance manquante ou une régression atteigne main.

on:
  pull_request:
  push:
    branches: [main]

# Annule les exécutions précédentes encore en cours sur la même réf.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Bloquant : la suite complète passe (1208/1208). Toute régression
      # (test cassé ou nouveau test rouge) bloque désormais la PR.
      - name: Unit tests
        run: npm test

      # Bloquant : le build a déjà cassé sur main faute de dépendances
      # déclarées (react-hot-toast, @tanstack/react-virtual, @dnd-kit/*,
      # papaparse). Ce gate empêche que cela se reproduise.
      - name: Production build
        run: npm run build
